<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Server Dashboard</h1>
    </header>
    <main>
        <section id="server-status">
            <h2>Server Status</h2>
            <div id="status-display">
                <p>Server is running...</p>
                <!-- Additional status display could go here -->
            </div>
        </section>
        <section id="controls">
            <h2>Controls</h2>
            <button onclick="startServer()">Start Server</button>
            <button onclick="stopServer()">Stop Server</button>
            <!-- More controls can be added here -->
        </section>
        <section id="info-display">
            <h2>Information Display</h2>
            <p>Welcome to the main dashboard. You can view the server status and control it from here.</p>
            <!-- Additional information could be added here -->
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Mahesh V9214.</p>
    </footer>
    <script>
        function startServer() {
            // code to start server
            alert('Server starting...');
        }
        function stopServer() {
            // code to stop server
            alert('Server stopping...');
        }
    </script>
</body>
</html>

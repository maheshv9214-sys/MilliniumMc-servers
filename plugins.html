<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>One-Click Plugin Installation</title>\n</head>\n<body>\n    <h1>One-Click Plugin Installation</h1>\n    <h2>Integration with PlayIt.gg</h2>\n    <button id="playit-install">Install PlayIt.gg</button>\n    <h2>EssentialsX</h2>\n    <button id="essentials-install">Install EssentialsX</button>\n    <h2>LiteBans</h2>\n    <button id="litebans-install">Install LiteBans</button>\n    <h2>WorldEdit</h2>\n    <button id="worldedit-install">Install WorldEdit</button>\n    <h2>Custom Plugin Upload</h2>\n    <input type="file" id="custom-plugin-upload" />\n    <button id="upload-custom-plugin">Upload Plugin</button>\n    <script>\n        document.getElementById('playit-install').onclick = function() { alert('Installing PlayIt.gg...'); };\n        document.getElementById('essentials-install').onclick = function() { alert('Installing EssentialsX...'); };\n        document.getElementById('litebans-install').onclick = function() { alert('Installing LiteBans...'); };\n        document.getElementById('worldedit-install').onclick = function() { alert('Installing WorldEdit...'); };\n        document.getElementById('upload-custom-plugin').onclick = function() { alert('Uploading custom plugin...'); };\n    <\/script>\n</body>\n</html>
